<!DOCTYPE html><!--Definimos que el documento es de tipo HMTL5-->
<html><!--inicia el documento-->
<head><!--inicia el area de encabezado de metadatos-->
    <!--las etiquetas meta definen metadatos-->
    <meta charset="UTF-8"> <!--la codificación de caracteres del documento será UTF 8-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--viewport hace referencia a la salida de pantalla
    y el documento se adapta al ancho del dispositivo-->
    <title>HTML BASICO 1</title> <!--definimos el título de la página-->
</head><!--cierra el encabezado de metadatos-->
<body><!--abre el área visible por el usuario o cuerpo de la página-->
    <h1>Hola mundo</h1><!--la etiqueta h viene de Heading(Encabezado) y 1 es el nivel-->
    <h2>Otro Heading</h2><!--En este caso el nivel 2-->
    <p>Este es un párrafo</p><!--paragraph, genera un salto de línea como en los casos anteriores-->
    Texto independiente <!--Este texto no está en una caja y no genera un salto de línea-->
    pero sin salto de línea <br> <!--br viene de Break o ruptura, generando el salto de línea-->
    Acá si salta la línea

</body><!--Cierra el cuerpo de la página-->
</html><!--Cierra el documento-->
