<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel sencillo con JS</title>
</head>
<body>
    <div id="paraIMG">
        <img src="./images/1.jpg" id="desliza">
    </div>
    <script>
        var imgArray=['./images/2.jpg','./images/3.jpg','./images/4.jpg','./images/1.jpg'];
        var misImagenes=document.getElementById("desliza");
        var i=0;
        setInterval(miCarru,1500);
        miCarru;
        function miCarru(){
            misImagenes.src=imgArray[i];
            if(i<imgArray.length-1){
                i++
            }else{
                i=0;
            }
        }
    </script>
</body>
</html>
