    <!--Cuando utilizamos un png, por lo general tiene un tamaño de 32px x 32px,

    <link rel="icon" href="iconoAppleTouch.png" type="apple-touch-icon">

    la relación es icon, pero type cambia a apple-touch-icon-->

    <title>HTML BASICO 3</title>
</head>
<body>
    <header><!--Etiqueta semántica que define un contenedor de cabecera-->

            <img src="./images/SegInf.png" alt="prueba" title="Logo">
            <!--viene de imagen y contiene justamente eso, src viene de source
            es decir el origen o fuente de un archivo, alt viene de alternative text
            aparece si la imagen no carga, finalmente title que permite mostrar
            al usuario un cuadro de texto -->
        </div>
